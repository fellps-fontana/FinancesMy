<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    ::placeholder { color: #6f6b7a; }
    input:focus { outline: none; }
  </style>
</helmet>

<div style="background:#0e0d13; min-height:100vh; padding:56px 40px; display:flex; flex-wrap:wrap; gap:56px; align-items:flex-start; font-family:'Inter',sans-serif;">

  <!-- MOBILE -->
  <div style="display:flex; flex-direction:column; gap:14px;">
    <span style="color:#6f6b7a; font-size:12px;">Mobile</span>
    <div style="width:390px; min-height:844px; background:#0e0d13; border:0.5px solid #2a2636; border-radius:32px; overflow:hidden; box-shadow:0 30px 60px rgba(0,0,0,0.35); display:flex; flex-direction:column; padding:64px 28px 40px;">
      <div style="display:flex; flex-direction:column; align-items:center; gap:16px; margin-bottom:48px;">
        <div style="width:56px; height:56px; border-radius:16px; background:#26215C; display:flex; align-items:center; justify-content:center;">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#AFA9EC" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/><circle cx="16.5" cy="14" r="1"/></svg>
        </div>
        <div style="text-align:center;">
          <div style="color:#f2f0f7; font-size:19px; font-weight:500;">Financeiro</div>
          <div style="color:#8b8794; font-size:13px; margin-top:4px;">Entre para continuar</div>
        </div>
      </div>

      <div style="display:flex; flex-direction:column; gap:14px;">
        <div style="display:flex; flex-direction:column; gap:6px;">
          <label style="color:#8b8794; font-size:13px;">E-mail</label>
          <input type="email" placeholder="voce@email.com" value="marina.alves@email.com" style="background:#17151f; border:0.5px solid #2a2636; border-radius:10px; padding:14px 14px; color:#e8e6ef; font-size:14px; font-family:'Inter',sans-serif;"/>
        </div>
        <div style="display:flex; flex-direction:column; gap:6px;">
          <label style="color:#8b8794; font-size:13px;">Senha</label>
          <input type="password" value="••••••••••" style="background:#17151f; border:0.5px solid #2a2636; border-radius:10px; padding:14px 14px; color:#e8e6ef; font-size:14px; font-family:'Inter',sans-serif;"/>
        </div>
        <div style="text-align:right; margin-top:-2px;">
          <span style="color:#8b8794; font-size:13px;">Esqueci minha senha</span>
        </div>

        <button style="margin-top:10px; background:#7F77DD; color:#0e0d13; border:none; border-radius:10px; padding:15px; font-size:14px; font-weight:500; font-family:'Inter',sans-serif;">Entrar</button>

        <div style="display:flex; align-items:center; gap:10px; margin:6px 0;">
          <div style="flex:1; height:0.5px; background:#2a2636;"></div>
          <span style="color:#6f6b7a; font-size:12px;">ou</span>
          <div style="flex:1; height:0.5px; background:#2a2636;"></div>
        </div>

        <button style="background:#17151f; color:#e8e6ef; border:0.5px solid #2a2636; border-radius:10px; padding:15px; font-size:14px; font-weight:500; font-family:'Inter',sans-serif;">Entrar com código de acesso</button>
      </div>

      <div style="margin-top:auto; text-align:center; padding-top:32px;">
        <span style="color:#8b8794; font-size:13px;">Nao tem conta? </span>
        <span style="color:#AFA9EC; font-size:13px;">Criar conta</span>
      </div>
    </div>
  </div>

  <!-- DESKTOP -->
  <div style="display:flex; flex-direction:column; gap:14px;">
    <span style="color:#6f6b7a; font-size:12px;">Desktop</span>
    <div style="width:1280px; height:800px; background:#0e0d13; border:0.5px solid #2a2636; border-radius:12px; overflow:hidden; box-shadow:0 30px 60px rgba(0,0,0,0.35); display:flex;">

      <div style="width:50%; background:#26215C; display:flex; flex-direction:column; justify-content:center; padding:80px; position:relative;">
        <div style="width:52px; height:52px; border-radius:14px; background:#17151f; display:flex; align-items:center; justify-content:center; margin-bottom:40px;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#AFA9EC" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/><circle cx="16.5" cy="14" r="1"/></svg>
        </div>
        <div style="color:#f2f0f7; font-size:28px; font-weight:500; line-height:1.3; max-width:420px;">Suas financas, num so lugar.</div>
        <div style="color:#AFA9EC; font-size:14px; margin-top:16px; max-width:380px; line-height:1.6;">Controle contas, cartoes e categorias com clareza — sem enfeite, so o que importa.</div>
      </div>

      <div style="width:50%; display:flex; align-items:center; justify-content:center;">
        <div style="width:360px; display:flex; flex-direction:column; gap:16px;">
          <div style="margin-bottom:12px;">
            <div style="color:#f2f0f7; font-size:19px; font-weight:500;">Entrar</div>
            <div style="color:#8b8794; font-size:13px; margin-top:4px;">Acesse sua conta</div>
          </div>

          <div style="display:flex; flex-direction:column; gap:6px;">
            <label style="color:#8b8794; font-size:13px;">E-mail</label>
            <input type="email" value="marina.alves@email.com" style="background:#17151f; border:0.5px solid #2a2636; border-radius:10px; padding:13px 14px; color:#e8e6ef; font-size:14px; font-family:'Inter',sans-serif;"/>
          </div>
          <div style="display:flex; flex-direction:column; gap:6px;">
            <label style="color:#8b8794; font-size:13px;">Senha</label>
            <input type="password" value="••••••••••" style="background:#17151f; border:0.5px solid #2a2636; border-radius:10px; padding:13px 14px; color:#e8e6ef; font-size:14px; font-family:'Inter',sans-serif;"/>
          </div>
          <div style="text-align:right; margin-top:-4px;">
            <span style="color:#8b8794; font-size:13px;">Esqueci minha senha</span>
          </div>
          <button style="margin-top:8px; background:#7F77DD; color:#0e0d13; border:none; border-radius:10px; padding:14px; font-size:14px; font-weight:500; font-family:'Inter',sans-serif;">Entrar</button>
          <div style="text-align:center; margin-top:8px;">
            <span style="color:#8b8794; font-size:13px;">Nao tem conta? </span>
            <span style="color:#AFA9EC; font-size:13px;">Criar conta</span>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

</x-dc>
</body>
</html>
